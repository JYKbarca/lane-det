dataset:
  name: tusimple
  root: /root/autodl-tmp/datasets/archive/TUSimple/train_set
  list_file: /root/autodl-tmp/datasets/archive/TUSimple/train_set/train.json
  img_size: [1280, 720]
  y_samples: 56
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

paths:
  anchor_cache: /root/autodl-tmp/outputs/cache/anchors
  checkpoint_root: /root/autodl-tmp/checkpoints/lane-det
  output_root: /root/autodl-tmp/outputs/lane-det

anchor:
  # Using dict format to specify range including outside image
  # Bottom anchors (original)
  x_positions:
    start: 0
    end: 1280
    step: 10
  angles: [-75,-70,-65,-60,-55,-50,-45,-40,-35,-30,-25,-20,-15,-10,-5,0,5,10,15,20,25,30,35,40,45,50,55,60,65,70,75]
  # Side-anchor densification
  side_y_step: 20
  side_y_start_ratio: 0.5
  side_angle_min: 10.0
  num_y: 56
  # Line IoU based assignment
  line_iou_neg_thr: 0.10
  line_iou_width: 25.0
  line_iou_width_bottom: 25.0
  line_iou_width_side: 35.0
  # Stricter valid-point constraints
  min_common_points: 3
  min_common_points_bottom: 3
  min_common_points_side: 2
  min_common_ratio: 0.10
  min_common_ratio_bottom: 0.12
  min_common_ratio_side: 0.05
  # Geometric gating thresholds
  geo_angle_thr: 75.0
  geo_x_bottom_thr: 350.0
  # Top-region consistency constraint
  top_region_ratio: 0.4
  top_max_mean_err: 20.0
  top_max_mean_err_bottom: 30.0
  top_max_mean_err_side: 36.0
  top_min_points: 2
  top_min_points_bottom: 2
  top_min_points_side: 0

model:
  backbone: resnet18
  fpn_out: 128
  head_channels: 128
  use_masked_pooling: true
  debug_shapes: false
  use_refinement: true
  reg_seq_layers: 3
  reg_hidden_channels: 128
  reg_kernel_size: 3

loss:
  smooth_l1_beta: 1.0
  cls_weight: 20.0
  rank_weight: 1.0
  rank_margin: 0.2
  hard_neg_topk: 2
  hard_neg_iou_min: 0.2
  reg_weight: 2.0    # Higher regression weight to prioritize shape accuracy
  reg_loss_stage1_weight: 0.5
  reg_loss_stage2_weight: 1.0

  use_line_overlap_loss: true
  line_loss_weight: 0.1
  line_sigma: 12.0
  line_sigma_refined: 6.0
  line_sigma_step: 12
  line_min_valid_points: 3


train:
  batch_size: 8
  lr: 0.001
  epochs: 20
  weight_decay: 0.0001
  lr_milestones: [6, 10]
  lr_gamma: 0.3

eval:
  score_thr: 0.6
  nms_thr: 20.0
  nms_min_common_points: 8
  nms_overlap_ratio_thr: 0.6
  nms_top_dist_ratio: 1.25
  nms_bottom_dist_ratio: 1.0
  disable_polyfit: false
  max_lanes: 5
  min_valid_points: 4

match:
  topk_per_gt: 2
  min_force_pos_iou: 0.25
  use_soft_gating: true
  soft_common: false
  soft_top: true
  soft_angle: true
  penalty_common_ratio: 0.2
  penalty_top_err: 0.85
  penalty_angle: 0.7
  pos_score_min: 0.7
  neg_thr: 0.10

augmentation:
  flip_p: 0.5
  brightness: 0.3
  contrast: 0.3
  saturation: 0.3
  color_p: 0.8
