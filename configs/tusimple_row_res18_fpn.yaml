dataset:
  name: tusimple
  root: /root/autodl-tmp/datasets/archive/TUSimple/train_set
  list_file: /root/autodl-tmp/datasets/archive/TUSimple/train_set/train.json
  img_size: [1280, 720]
  y_samples: 56
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

paths:
  checkpoint_root: /root/autodl-tmp/checkpoints/lane-det-row
  output_root: /root/autodl-tmp/outputs/lane-det-row

row:
  max_lanes: 5
  num_y: 56
  num_grids: 100

model:
  backbone: resnet18
  fpn_out: 128
  row_hidden_dim: 256
  row_dropout: 0.1

loss:
  exist_weight: 1.0
  row_valid_weight: 1.0
  grid_weight: 1.0
  coord_weight: 1.0
  diff_weight: 0.2

train:
  batch_size: 4
  lr: 0.001
  epochs: 25
  weight_decay: 0.0001
  lr_milestones: [12, 18]
  lr_gamma: 0.3

eval:
  exist_score_thr: 0.7
  row_valid_score_thr: 0.5
  continuity_min_segment_points: 3
  continuity_max_row_gap: 1
  continuity_max_dx_ratio: 0.08

augmentation:
  flip_p: 0.5
  brightness: 0.3
  contrast: 0.3
  saturation: 0.3
  color_p: 0.8
  occlusion_p: 0.35
  occlusion_num_range: [1, 2]
  occlusion_width_range: [0.08, 0.18]
  occlusion_height_range: [0.08, 0.22]
  shadow_p: 0.3
  shadow_width_range: [0.2, 0.5]
  shadow_height_range: [0.2, 0.45]
  shadow_darkness_range: [0.45, 0.75]
  shadow_x_drift_ratio: 0.08
  blur_p: 0.2
  blur_kernel_choices: [3, 5]
  geom_p: 0.0
  max_translate_x_ratio: 0.04
  max_translate_y_ratio: 0.03
  max_shear_x_ratio: 0.08
